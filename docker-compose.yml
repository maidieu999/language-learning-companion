services:
  postgres:
    image: pgvector/pgvector:pg16

    container_name: llc-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llc

    ports:
      # Host 5433 avoids conflict with local Homebrew/system Postgres on 5432
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:latest
    container_name: llc-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      S3_BUCKET: llc-documents
    volumes:
      - localstack_data:/var/lib/localstack
      - ./docker/localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh

volumes:
  postgres_data:
  localstack_data: