services:
  postgres:
    image: pgvector/pgvector:pg16

    container_name: llc-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llc

    ports:
      # Host 5433 avoids conflict with local Homebrew/system Postgres on 5432
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: